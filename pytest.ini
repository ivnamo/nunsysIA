[pytest]
testpaths = tests
pythonpath = .
addopts = -ra
filterwarnings =
    ignore:The default value of `allowed_objects` will change in a future version.*:langchain_core._api.deprecation.LangChainPendingDeprecationWarning
markers =
    real_llm: tests opt-in que llaman a un proveedor LLM real; requieren RUN_REAL_LLM_TESTS=1 y clave configurada
