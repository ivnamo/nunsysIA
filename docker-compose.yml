services:
  chromadb:
    image: chromadb/chroma:1.5.0
    container_name: nunsysia-chromadb
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8003:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "grep -q ':1F40' /proc/net/tcp",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  production-api:
    build:
      context: .
    container_name: nunsysia-production-api
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "production_mock.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
      ]
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: .
    container_name: nunsysia-backend
    depends_on:
      chromadb:
        condition: service_healthy
      production-api:
        condition: service_healthy
    environment:
      APP_ENV: docker
      AGENT_MODE: ${AGENT_MODE:-deepagent}
      AGENT_EXECUTION_TIMEOUT_SECONDS: ${AGENT_EXECUTION_TIMEOUT_SECONDS:-120}
      PRODUCTION_API_BASE_URL: http://production-api:8001
      PRODUCTION_API_TIMEOUT_SECONDS: ${PRODUCTION_API_TIMEOUT_SECONDS:-5.0}
      CHROMA_MODE: http
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-documents}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-900}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-120}
      RAG_TOP_K: ${RAG_TOP_K:-3}
      MAX_DOCUMENT_UPLOAD_BYTES: ${MAX_DOCUMENT_UPLOAD_BYTES:-10485760}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      DEEPAGENTS_MODEL: ${DEEPAGENTS_MODEL:-google_genai:gemini-2.5-flash}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_API_TRANSPORT: ${GEMINI_API_TRANSPORT:-rest}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  chainlit:
    build:
      context: .
    container_name: nunsysia-chainlit
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_API_BASE_URL: http://backend:8000
      BACKEND_API_TIMEOUT_SECONDS: ${BACKEND_API_TIMEOUT_SECONDS:-120.0}
      AGENT_MODE: ${AGENT_MODE:-deepagent}
    command:
      [
        "python",
        "-m",
        "chainlit",
        "run",
        "chainlit_app/main.py",
        "--host",
        "0.0.0.0",
        "--port",
        "8002",
      ]
    ports:
      - "8002:8002"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  evaluator:
    build:
      context: .
    container_name: nunsysia-evaluator
    profiles:
      - eval
    depends_on:
      backend:
        condition: service_healthy
      chainlit:
        condition: service_healthy
    environment:
      API_BASE_URL: http://backend:8000
      AGENT_MODE: ${AGENT_MODE:-deepagent}
      EVALUATOR_DOCKER_COMMAND: ${EVALUATOR_DOCKER_COMMAND:-docker compose --profile eval up --build evaluator}
    command:
      [
        "python",
        "scripts/run_delivery_validation.py",
        "--base-url",
        "http://backend:8000",
        "--production-url",
        "http://production-api:8001",
        "--chainlit-url",
        "http://chainlit:8002",
        "--chroma-url",
        "http://chromadb:8000",
        "--mode",
        "deepagent",
        "--output",
        "reports/VALIDACION_ENTREGA.md",
      ]
    volumes:
      - ./reports:/app/reports

volumes:
  chroma_data:
